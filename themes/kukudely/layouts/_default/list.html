{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages }}
    <article class="post-item">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
