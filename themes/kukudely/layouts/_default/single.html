{{ define "main" }}
<div class="container">
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </header>
    <div class="content">{{ .Content }}</div>
    {{ with .Params.tags }}
    <div class="tags">
      {{ range . }}
      <a class="tag" href="{{ "/tags/" | relURL }}{{ . | urlize }}">{{ . }}</a>
      {{ end }}
    </div>
    {{ end }}
  </article>
  <a class="back" href="{{ .Site.BaseURL }}">← back</a>
</div>
{{ end }}
